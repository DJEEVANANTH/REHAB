name: Appium Mobile E2E Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  appium-tests:
    name: Mobile UI Testing (Appium)
    runs-on: ubuntu-latest
    
    # We need to run inside a machine that can boot Android Emulator
    # Hardware acceleration is required for emulators
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './mobile-app/package-lock.json'

      - name: Install Mobile App Dependencies
        working-directory: ./mobile-app
        run: npm install

      - name: Run Appium/Mocha E2E Tests
        working-directory: ./mobile-app
        run: npm run test:e2e
        
      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-excel-report
          path: mobile-app/reports/
          retention-days: 7
          
      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: appium-error-screenshots
          path: mobile-app/errorShots/
          retention-days: 7
